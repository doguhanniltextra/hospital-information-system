spring.application.name=support-service
server.port=8085

# Database Configuration (PostgreSQL) - Write Side
spring.datasource.write.jdbc-url=${SPRING_DATASOURCE_URL:jdbc:postgresql://support-db:5432/support_db?currentSchema=support_schema}
spring.datasource.write.username=${SPRING_DATASOURCE_USERNAME:support_user}
spring.datasource.write.password=${SPRING_DATASOURCE_PASSWORD:support_pass_123}
spring.datasource.write.driver-class-name=org.postgresql.Driver

# Database Configuration (PostgreSQL) - Read Side
spring.datasource.read.jdbc-url=${SPRING_DATASOURCE_URL:jdbc:postgresql://support-db:5432/support_db?currentSchema=support_schema}
spring.datasource.read.username=${SPRING_DATASOURCE_USERNAME:support_user}
spring.datasource.read.password=${SPRING_DATASOURCE_PASSWORD:support_pass_123}
spring.datasource.read.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.default_schema=support_schema
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Redis Configuration (Cache Side)
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.cache.type=redis

# Kafka Configuration
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
spring.kafka.consumer.group-id=support-service-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# Swagger / OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Actuator & Monitoring
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always
management.metrics.export.prometheus.enabled=true
management.tracing.sampling.probability=1.0

# Tracing
spring.kafka.producer.observation-enabled=true
spring.kafka.listener.observation-enabled=true
