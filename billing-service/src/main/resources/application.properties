server.port=8081

# Database configuration (Dual DataSource - CQRS)
# Write Database
spring.datasource.write.url=${SPRING_DATASOURCE_WRITE_URL:jdbc:postgresql://billing-write-db:5439/billing_db?currentSchema=billing_schema}
spring.datasource.write.username=${SPRING_DATASOURCE_USERNAME:billing_user}
spring.datasource.write.password=${SPRING_DATASOURCE_PASSWORD:billing_pass_123}
spring.datasource.write.driver-class-name=org.postgresql.Driver

# Read Database
spring.datasource.read.url=${SPRING_DATASOURCE_READ_URL:jdbc:postgresql://billing-read-db:5439/billing_db?currentSchema=billing_schema}
spring.datasource.read.username=${SPRING_DATASOURCE_USERNAME:billing_user}
spring.datasource.read.password=${SPRING_DATASOURCE_PASSWORD:billing_pass_123}
spring.datasource.read.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update

# Explicitly set the default schema for Hibernate to find tables in billing_schema
spring.jpa.properties.hibernate.default_schema=billing_schema
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# HikariCP Connection Pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.initialization-fail-timeout=0

# gRPC
grpc.server.port=9001
logging.pattern.console=%-5level %logger{36} - %msg%n
spring.output.ansi.enabled=ALWAYS

# External APIs
invoice.api.key=${INVOICE_API_KEY}
invoice.api.url=${INVOICE_API_URL:https://invoice-generator.com}
claim.api.url=${CLAIM_API_URL:https://httpbin.org/status/200}
claims.retry.fixed-delay-ms=${CLAIMS_RETRY_FIXED_DELAY_MS:300000}

# Resilience4j - Claim Provider
resilience4j.circuitbreaker.instances.claimProvider.sliding-window-size=10
resilience4j.circuitbreaker.instances.claimProvider.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.claimProvider.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.claimProvider.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.claimProvider.minimum-number-of-calls=5

# Tracing & Observation
management.tracing.sampling.probability=1.0
spring.kafka.producer.observation-enabled=true
spring.kafka.listener.observation-enabled=true

# Actuator
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always
management.metrics.tags.application=billing-service

# Kafka
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
kafka.topics.lab-order-placed=${KAFKA_TOPIC_LAB_ORDER_PLACED:lab-order-placed.v1}
kafka.groups.billing-lab-order=${KAFKA_GROUP_BILLING_LAB_ORDER:billing-lab-order-group}

# Storage
app.invoice.storage.path=${APP_INVOICE_STORAGE_PATH:./invoices}
