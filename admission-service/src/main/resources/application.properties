spring.application.name=admission-service
server.port=8086

# Database configuration (CQRS Dual DataSource)
# Write Database
spring.datasource.write.url=${SPRING_DATASOURCE_WRITE_URL:jdbc:postgresql://admission-write-db:5442/admission_db?currentSchema=admission_schema}
spring.datasource.write.username=${SPRING_DATASOURCE_USERNAME:admission_user}
spring.datasource.write.password=${SPRING_DATASOURCE_PASSWORD:admission_pass_123}
spring.datasource.write.driver-class-name=org.postgresql.Driver

# Read Database
spring.datasource.read.url=${SPRING_DATASOURCE_READ_URL:jdbc:postgresql://admission-read-db:5442/admission_db?currentSchema=admission_schema}
spring.datasource.read.username=${SPRING_DATASOURCE_USERNAME:admission_user}
spring.datasource.read.password=${SPRING_DATASOURCE_PASSWORD:admission_pass_123}
spring.datasource.read.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Explicitly set the default schema for Hibernate to find tables in admission_schema
spring.jpa.properties.hibernate.default_schema=admission_schema
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Kafka configuration
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
spring.kafka.consumer.group-id=admission-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# Service Security
app.secret=${APP_SECRET:mySecretKeyForJwtTokenWhichMustBeAtLeast256BitsLong}
internal.service.token=${INTERNAL_SERVICE_TOKEN:pm-internal-token}

# API documentation
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Actuator
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always
management.metrics.export.prometheus.enabled=true

# Tracing & Observation
management.tracing.sampling.probability=1.0
spring.kafka.producer.observation-enabled=true
spring.kafka.listener.observation-enabled=true

# Redis & Caching
spring.cache.type=redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# GRPC Client
grpc.client.patient-service.address=static://${PATIENT_SERVICE_GRPC_HOST:localhost}:9090
grpc.client.patient-service.negotiation-type=plaintext

# Kafka Topics
kafka.topic.admission-bed-charge=admission-bed-charge.v1
kafka.topic.admission-discharged=admission-discharged.v1
