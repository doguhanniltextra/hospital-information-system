spring.profiles.active=default

# =============================================================================
# Database configuration (Dual DataSource - CQRS)
# =============================================================================
# Write Database
spring.datasource.write.url=${PATIENT_WRITE_DB_URL:jdbc:postgresql://patient-write-db:5432/patient_db?currentSchema=patient_schema}
spring.datasource.write.username=${SPRING_DATASOURCE_USERNAME:patient_user}
spring.datasource.write.password=${SPRING_DATASOURCE_PASSWORD:patient_pass_123}
spring.datasource.write.driver-class-name=org.postgresql.Driver

# Read Database
spring.datasource.read.url=${PATIENT_READ_DB_URL:jdbc:postgresql://patient-read-db:5432/patient_db?currentSchema=patient_schema}
spring.datasource.read.username=${SPRING_DATASOURCE_USERNAME:patient_user}
spring.datasource.read.password=${SPRING_DATASOURCE_PASSWORD:patient_pass_123}
spring.datasource.read.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.default_schema=patient_schema
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect


# =============================================================================
# HikariCP Connection Pool (applies to all profiles)
# =============================================================================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.initialization-fail-timeout=0

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

# Consumer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# =============================================================================
# Actuator / Prometheus Metrics
# =============================================================================
# Tracing & Observation
management.tracing.sampling.probability=1.0
spring.kafka.producer.observation-enabled=true
spring.kafka.listener.observation-enabled=true
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always
management.metrics.tags.application=patient-management

# =============================================================================
# Resilience4j — Circuit Breaker (Kafka producer protection)
# =============================================================================
resilience4j.circuitbreaker.instances.kafkaProducer.sliding-window-size=10
resilience4j.circuitbreaker.instances.kafkaProducer.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.kafkaProducer.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.kafkaProducer.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.kafkaProducer.minimum-number-of-calls=5

# =============================================================================
# Resilience4j — Retry (Kafka transient failures)
# =============================================================================
resilience4j.retry.instances.kafkaProducer.max-attempts=3
resilience4j.retry.instances.kafkaProducer.wait-duration=1s
kafka.topics.lab-result-completed=${KAFKA_TOPIC_LAB_RESULT_COMPLETED:lab-result-completed.v1}
kafka.groups.patient-lab-result=${KAFKA_GROUP_PATIENT_LAB_RESULT:patient-lab-result-group}
