server:
  port: 8090

spring:
  application:
    name: notification-service
  
  datasource:
    write:
      jdbc-url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://notification-db:5432/notification_db?currentSchema=notification_schema}
      username: ${SPRING_DATASOURCE_USERNAME:notification_user}
      password: ${SPRING_DATASOURCE_PASSWORD:notification_pass_123}
      driver-class-name: org.postgresql.Driver
    read:
      jdbc-url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://notification-db:5432/notification_db?currentSchema=notification_schema}
      username: ${SPRING_DATASOURCE_USERNAME:notification_user}
      password: ${SPRING_DATASOURCE_PASSWORD:notification_pass_123}
      driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        default_schema: notification_schema

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  cache:
    type: redis
    redis:
      time-to-live: 3600000 # 1 hour
      cache-null-values: false

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: notification-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      observation-enabled: true
    listener:
      observation-enabled: true

grpc:
  client:
    patient-service:
      address: 'static://localhost:9090'
      negotiation-type: plaintext

management:
  tracing:
    sampling:
      probability: 1.0
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always

# Custom properties (No hard-coded endpoints)
services:
  patient-service:
    url: ${PATIENT_SERVICE_URL:http://localhost:8080}

logging:
  level:
    root: INFO
    com.project.notification_service: DEBUG
