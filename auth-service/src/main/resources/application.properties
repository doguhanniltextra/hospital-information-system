spring.application.name=auth-service

server.port=8089

# Database configuration (Isolated PostgreSQL Schema)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://auth-db:5432/auth_db?currentSchema=auth_schema}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:auth_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:auth_pass_123}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Explicitly set the default schema for Hibernate to find tables in auth_schema
spring.jpa.properties.hibernate.default_schema=auth_schema

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.initialization-fail-timeout=0

app.secret=${APP_SECRET:mySecretKeyForJwtTokenWhichMustBeAtLeast256BitsLong}
app.expiration=3600000

metrics.recording.level=OFF

# Actuator / Prometheus
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always
management.metrics.tags.application=auth-service

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}

# Kafka Consumer (patient-created.v1 → StringDeserializer — patient-service sends raw JSON)
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.auto-offset-reset=earliest

# Kafka Producer (user-provisioned.v1 → StringSerializer — manually serialised JSON)
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

# Topic & Group names
kafka.topics.patient-created=patient-created.v1
kafka.topics.user-provisioned=user-provisioned.v1
kafka.groups.auth-patient-provisioning=auth-patient-provisioning-group
