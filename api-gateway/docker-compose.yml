
services:
  api-gateway:
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M
    build:
      context: .
      dockerfile: Dockerfile
    container_name: api-gateway
    env_file: .env
    restart: unless-stopped
    ports:
      - "4004:4004"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SERVER_PORT: 4004
      APP_SECRET: ${APP_SECRET}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    volumes:
      - ./src:/app/src
    networks:
      - patient-global-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4004/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5

networks:
  patient-global-network:
    external: true
