server.port=8084

# Database configuration (Isolated PostgreSQL Schema)
# Write Database configuration
spring.datasource.write.jdbc-url=${SPRING_DATASOURCE_WRITE_JDBC_URL:jdbc:postgresql://appointment-write-db:5432/appointment_db?currentSchema=appointment_schema}
spring.datasource.write.username=${SPRING_DATASOURCE_WRITE_USERNAME:appointment_user}
spring.datasource.write.password=${SPRING_DATASOURCE_WRITE_PASSWORD:appointment_pass_123}
spring.datasource.write.driver-class-name=org.postgresql.Driver

# Read Database configuration
spring.datasource.read.jdbc-url=${SPRING_DATASOURCE_READ_JDBC_URL:jdbc:postgresql://appointment-read-db:5432/appointment_db?currentSchema=appointment_schema}
spring.datasource.read.username=${SPRING_DATASOURCE_READ_USERNAME:appointment_user}
spring.datasource.read.password=${SPRING_DATASOURCE_READ_PASSWORD:appointment_pass_123}
spring.datasource.read.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Explicitly set the default schema for Hibernate to find tables in appointment_schema
spring.jpa.properties.hibernate.default_schema=appointment_schema

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.initialization-fail-timeout=0

# Kafka
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
metrics.recording.level=OFF

# Resilience4j - Circuit Breaker
resilience4j.circuitbreaker.instances.patientService.sliding-window-size=10
resilience4j.circuitbreaker.instances.patientService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.patientService.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.patientService.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.patientService.minimum-number-of-calls=5

resilience4j.circuitbreaker.instances.doctorService.sliding-window-size=10
resilience4j.circuitbreaker.instances.doctorService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.doctorService.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.doctorService.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.doctorService.minimum-number-of-calls=5

# Resilience4j - Retry
resilience4j.retry.instances.patientService.max-attempts=3
resilience4j.retry.instances.patientService.wait-duration=500ms

resilience4j.retry.instances.doctorService.max-attempts=3
resilience4j.retry.instances.doctorService.wait-duration=500ms

# Tracing & Observation
management.tracing.sampling.probability=1.0
spring.kafka.producer.observation-enabled=true
spring.kafka.listener.observation-enabled=true

# Actuator
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always
management.metrics.tags.application=appointment-service
internal.service.token=${INTERNAL_SERVICE_TOKEN:pm-internal-token}
