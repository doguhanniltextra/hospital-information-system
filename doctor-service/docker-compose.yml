version: "3.8"

services:
  doctor-write-db:
    image: postgres:15-alpine
    container_name: doctor-write-db
    env_file: .env
    restart: unless-stopped
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - doctor-write-data:/var/lib/postgresql/data
      - ./init/write-schema.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - patient-global-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  doctor-read-db:
    image: postgres:15-alpine
    container_name: doctor-read-db
    env_file: .env
    restart: unless-stopped
    ports:
      - "5435:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - doctor-read-data:/var/lib/postgresql/data
      - ./init/read-schema.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - patient-global-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  doctor-service:
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M
    build:
      context: .
      dockerfile: Dockerfile
    container_name: doctor-service
    env_file: .env
    restart: unless-stopped
    ports:
      - "8083:8083"
    depends_on:
      doctor-write-db:
        condition: service_healthy
      doctor-read-db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SERVER_PORT: 8083
      SPRING_DATASOURCE_WRITE_JDBC_URL: jdbc:postgresql://doctor-write-db:5432/${POSTGRES_DB}?currentSchema=doctor_schema&reWriteBatchedInserts=true
      SPRING_DATASOURCE_READ_JDBC_URL: jdbc:postgresql://doctor-read-db:5432/${POSTGRES_DB}?currentSchema=doctor_schema&reWriteBatchedInserts=true
      SPRING_DATASOURCE_WRITE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_WRITE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_DATASOURCE_READ_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_READ_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_DATASOURCE_WRITE_DRIVER_CLASS_NAME: org.postgresql.Driver
      SPRING_DATASOURCE_READ_DRIVER_CLASS_NAME: org.postgresql.Driver
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC_LAB_ORDER_PLACED: lab-order-placed.v1
      KAFKA_TOPIC_LAB_RESULT_COMPLETED: lab-result-completed.v1
      KAFKA_GROUP_DOCTOR_LAB_RESULT: doctor-lab-result-group
      APP_SECRET: ${APP_SECRET}
    volumes:
      - ./src:/app/src
    networks:
      - patient-global-network

volumes:
  doctor-write-data:
    driver: local
  doctor-read-data:
    driver: local

networks:
  patient-global-network:
    external: true